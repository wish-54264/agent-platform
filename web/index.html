<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Platform — AI 智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #e0e0e0; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* 顶栏 */
        .header {
            background: #16213e; padding: 12px 20px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 18px; color: #e94560; }
        .header .session-info { font-size: 12px; color: #888; }

        /* 主体 */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* 侧边栏 */
        .sidebar {
            width: 260px; background: #16213e; padding: 16px;
            border-right: 1px solid #0f3460; overflow-y: auto;
            display: flex; flex-direction: column; gap: 16px;
        }
        .sidebar h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar button {
            width: 100%; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-size: 13px; background: #0f3460; color: #e0e0e0;
            transition: background .2s;
        }
        .sidebar button:hover { background: #1a4a8a; }
        .sidebar button.new-chat { background: #e94560; color: #fff; font-weight: 600; }
        .sidebar button.new-chat:hover { background: #ff6b81; }
        .sidebar label.file-upload {
            display: block; padding: 10px; text-align: center; border-radius: 8px;
            cursor: pointer; font-size: 13px; background: #0f3460; color: #e0e0e0;
        }
        .sidebar label.file-upload:hover { background: #1a4a8a; }
        .sidebar input[type="file"] { display: none; }
        .sidebar .upload-status { font-size: 11px; color: #4ecca3; }

        /* 聊天区 */
        .chat-area {
            flex: 1; display: flex; flex-direction: column; background: #1a1a2e;
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* 消息气泡 */
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
        .msg.user { align-self: flex-end; background: #0f3460; }
        .msg.assistant { align-self: flex-start; background: #16213e; }
        .msg.thinking { align-self: flex-start; background: #1a1a2e; border: 1px solid #333; color: #888; font-style: italic; }
        .msg.tool {
            align-self: flex-start; background: #1a3a1a; border: 1px solid #2d5a2d;
            font-family: 'Fira Code', monospace; font-size: 12px;
        }
        .msg pre { white-space: pre-wrap; word-break: break-word; margin: 8px 0 0 0; }
        .msg .label {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 6px; color: #4ecca3;
        }
        .msg.tool .label { color: #ffc107; }

        /* 输入区 */
        .input-area {
            padding: 16px 20px; background: #16213e;
            border-top: 1px solid #0f3460; display: flex; gap: 10px;
        }
        .input-area textarea {
            flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 8px;
            background: #1a1a2e; color: #e0e0e0; resize: none; font-size: 14px;
            font-family: inherit; height: 48px; outline: none;
        }
        .input-area textarea:focus { border-color: #e94560; }
        .input-area button {
            padding: 12px 24px; border: none; border-radius: 8px;
            background: #e94560; color: #fff; font-weight: 600; cursor: pointer;
            font-size: 14px; transition: background .2s;
        }
        .input-area button:hover { background: #ff6b81; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent Platform</h1>
        <div class="session-info" id="sessionInfo">会话: 未创建</div>
    </div>

    <div class="main">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <button class="new-chat" onclick="newChat()">+ 新建对话</button>
            <h3>知识库</h3>
            <label class="file-upload">
                上传文档
                <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.md" onchange="uploadFile()">
            </label>
            <div class="upload-status" id="uploadStatus"></div>
            <div style="margin-top:auto;font-size:11px;color:#666;">
                API: <span id="apiStatus">未连接</span>
            </div>
        </div>

        <!-- 聊天区 -->
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="msg assistant">
                    你好！我是 AI 智能体助手。<br>我可以查询数据库、调用 HTTP API、检索知识库文档。试试问我问题吧。
                </div>
            </div>
            <div class="input-area">
                <textarea id="userInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080';
        let conversationId = null;
        let currentDiv = null;

        async function checkApi() {
            try { await fetch(API + '/actuator/health'); document.getElementById('apiStatus').textContent = '已连接'; document.getElementById('apiStatus').style.color = '#4ecca3'; } catch (e) { document.getElementById('apiStatus').textContent = '离线'; document.getElementById('apiStatus').style.color = '#e94560'; }
        }
        checkApi(); setInterval(checkApi, 10000);

        function newChat() {
            conversationId = null;
            document.getElementById('messages').innerHTML = '<div class="msg assistant">新对话已创建。有什么可以帮你的？</div>';
            document.getElementById('sessionInfo').textContent = '会话: 新建';
        }

        function addMessage(type, label, content) {
            const msgs = document.getElementById('messages');
            if (currentDiv && type === 'thinking' && currentDiv.dataset.msgType === 'thinking') {
                currentDiv.innerHTML = `<div class="label">${label}</div>${content}`;
                msgs.scrollTop = msgs.scrollHeight;
                return;
            }
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.dataset.msgType = type;
            if (label) div.innerHTML = `<div class="label">${label}</div>${content}`;
            else div.textContent = content;
            msgs.appendChild(div);
            currentDiv = div;
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            document.getElementById('sendBtn').disabled = true;

            // 用户消息
            addMessage('user', null, msg);

            // 创建 assistant 容器
            const assistantDiv = addMessage('assistant', '思考中...', '...');
            currentDiv = assistantDiv;
            currentDiv.dataset.msgType = 'assistant';

            try {
                const response = await fetch(API + '/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, conversationId: conversationId })
                });

                if (!response.ok) throw new Error('HTTP ' + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let thinkingText = '';
                let toolCalls = [];
                let finalAnswer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // 解析 SSE 行
                    while (buffer.includes('\n')) {
                        const idx = buffer.indexOf('\n');
                        const line = buffer.substring(0, idx).trim();
                        buffer = buffer.substring(idx + 1);
                        if (!line.startsWith('data:')) continue;
                        const jsonStr = line.substring(5).trim();
                        if (!jsonStr) continue;

                        try {
                            const event = JSON.parse(jsonStr);
                            handleEvent(event);
                        } catch (e) { console.warn('JSON 解析失败:', jsonStr); }
                    }
                }

                // 保存 conversationId
                if (conversationId) {
                    document.getElementById('sessionInfo').textContent = '会话: ' + conversationId.substring(0, 8) + '...';
                }

            } catch (e) {
                addMessage('assistant', '错误', e.message);
            } finally {
                document.getElementById('sendBtn').disabled = false;
                currentDiv = null;
            }
        }

        function handleEvent(event) {
            switch (event.type) {
                case 'THINKING':
                    // 合并到一个 thinking 展示块
                    if (!currentDiv || currentDiv.dataset.msgType !== 'thinking') {
                        currentDiv = addMessage('thinking', '思考', event.content);
                        currentDiv.dataset.msgType = 'thinking';
                    } else {
                        currentDiv.innerHTML = '<div class="label">思考</div>' + escapeHtml(event.content);
                    }
                    break;

                case 'TOOL_CALL':
                    currentDiv = addMessage('tool', '🔧 调用工具: ' + event.toolName,
                        '<pre>' + JSON.stringify(event.toolArguments, null, 2) + '</pre>');
                    break;

                case 'TOOL_RESULT':
                    if (event.success) {
                        currentDiv = addMessage('tool', '✅ 工具返回',
                            '<pre>' + JSON.stringify(event.toolResult, null, 2) + '</pre>');
                    } else {
                        currentDiv = addMessage('tool', '❌ 工具失败', event.toolResult);
                    }
                    break;

                case 'ANSWER':
                    currentDiv = addMessage('assistant', '回答', escapeHtml(event.content));
                    break;

                case 'DONE':
                    // 干净结束
                    break;

                case 'ERROR':
                    currentDiv = addMessage('assistant', '错误', event.content);
                    break;
            }
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            status.textContent = '上传中...';

            const formData = new FormData();
            formData.append('file', file);

            fetch(API + '/api/knowledge/upload', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    status.textContent = '上传成功: ' + (data.documentId || '').substring(0, 8) + '...';
                    addMessage('assistant', '文档上传', '✅ 文档 <b>' + file.name + '</b> 已上传，正在处理中...');
                })
                .catch(e => {
                    status.textContent = '上传失败';
                    addMessage('assistant', '错误', '文档上传失败: ' + e.message);
                });

            fileInput.value = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
